<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Cumpleaños Mamá!</title>
    <style>
        /* Esta sección le da estilo a la página */
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            text-align: center; 
            background-color: #fff0f3; /* Fondo rosa claro */
            color: #333;
            margin: 0; 
            padding: 0; 
        }
        header { 
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); 
            color: white; 
            padding: 60px 20px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { margin: 0; font-size: 2.5em; }
        .card { 
            padding: 30px 20px; 
            max-width: 500px; 
            margin: 30px auto; 
            background: white; 
            border-radius: 15px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
        }
        img { 
            max-width: 100%; 
            border-radius: 10px; 
            margin-top: 15px; 
        }
        /* Estilo para el botón sorpresa */
        button { 
            background: #ff4d6d; 
            color: white; 
            border: none; 
            padding: 15px 25px; 
            font-size: 1.1em; 
            border-radius: 25px; 
            margin-top: 25px; 
            width: 100%; 
        }
        button:active { background: #c9184a; } /* Se oscurece al tocarlo */
        #surprise-message { 
            display: none; /* Oculto hasta que se toca el botón */
            margin-top: 20px; 
            padding: 15px; 
            background: #ffccd5; 
            border-radius: 10px; 
            font-size: 1.2em;
            color: #d6336c; 
        }
    </style>
</head>
<body>

    <header>
        <h1>¡Feliz Cumpleaños, Mamá! 🎉</h1>
        <p>Para la mejor mamá del mundo</p>
    </header>
    
    <div class="card">
        <h2>Querida Mamá,</h2>
        <p>Gracias por todo lo que haces. Eres muy amada y valorada hoy y siempre.</p>
        <p>¡Espero que este año te traiga tanta felicidad como la que tú le das a todos los que te rodean!</p>
        
        <img src="https://images.unsplash.com/photo-1511895426328-dc8714191300?w=500&q=80" alt="Celebración de Cumpleaños">
        
        <button onclick="document.getElementById('surprise-message').style.display='block'">¡Toca para una sorpresa! 🎁</button>
        
        <div id="surprise-message">
            <strong>¡Te quiero mucho! ¡Que tengas el día más increíble! 💖🎂💐</strong>
        </div>
    </div>

</body>
</html>
